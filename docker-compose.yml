services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: content_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  dind:
    image: docker:27-dind
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 5s
      timeout: 5s
      retries: 10

  task-runner-build:
    image: docker:27
    environment:
      DOCKER_HOST: tcp://dind:2375
    depends_on:
      dind:
        condition: service_healthy
    volumes:
      - ./task-runner:/workspace
    command: docker build -t content-manager-task-runner:latest /workspace

  migrate:
    build: ./backend
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/content_manager
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/content_manager
      OIDC_DISCOVERY_URL: ${OIDC_DISCOVERY_URL}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      OIDC_ROLES_CLAIM: resource_access.content-manager.roles
      VALKEY_URL: redis://valkey:6379
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
    volumes:
      - ./backend:/app

  worker:
    build: ./backend
    command: python worker.py
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/content_manager
      VALKEY_URL: redis://valkey:6379
      DOCKER_HOST: tcp://dind:2375
      TASK_RUNNER_IMAGE: content-manager-task-runner:latest
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
      dind:
        condition: service_healthy
      task-runner-build:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
