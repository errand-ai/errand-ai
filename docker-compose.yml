services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: content_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  dind:
    image: docker:27-dind
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 5s
      timeout: 5s
      retries: 10

  task-runner-build:
    image: docker:27
    environment:
      DOCKER_HOST: tcp://dind:2375
    depends_on:
      dind:
        condition: service_healthy
    volumes:
      - ./task-runner:/workspace
    command: docker build -t errand-task-runner:latest /workspace

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/content_manager
    depends_on:
      postgres:
        condition: service_healthy

  errand:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-dev}
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/content_manager
      # OIDC_DISCOVERY_URL: ${OIDC_DISCOVERY_URL}
      # OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
      # OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      # OIDC_ROLES_CLAIM: resource_access.content-manager.roles
      VALKEY_URL: redis://valkey:6379
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY}
      TWITTER_API_KEY: ${TWITTER_API_KEY:-}
      TWITTER_API_SECRET: ${TWITTER_API_SECRET:-}
      TWITTER_ACCESS_TOKEN: ${TWITTER_ACCESS_TOKEN:-}
      TWITTER_ACCESS_SECRET: ${TWITTER_ACCESS_SECRET:-}
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: changeme
      MAX_TURNS: "200"
    depends_on:
      migrate:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python worker.py
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/content_manager
      VALKEY_URL: redis://valkey:6379
      DOCKER_HOST: tcp://dind:2375
      TASK_RUNNER_IMAGE: errand-task-runner:latest
      PLAYWRIGHT_MCP_IMAGE: mcr.microsoft.com/playwright/mcp:latest
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY}
      ERRAND_MCP_URL: http://errand:8000/mcp
      HINDSIGHT_URL: http://hindsight:8888
      MAX_TURNS: "200"
    depends_on:
      migrate:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
      dind:
        condition: service_healthy
      task-runner-build:
        condition: service_completed_successfully

  hindsight-init:
    image: ghcr.io/vectorize-io/hindsight:latest
    user: root
    volumes:
      - hindsight-data:/home/hindsight/.pg0
      - hindsight-models:/home/hindsight/.cache
    command: chown -R hindsight:hindsight /home/hindsight/.pg0 /home/hindsight/.cache

  hindsight:
    image: ghcr.io/vectorize-io/hindsight:latest
    ports:
      - "8888:8888"
      - "9999:9999"
    environment:
      HINDSIGHT_API_LLM_API_KEY: ${OPENAI_API_KEY}
      HINDSIGHT_API_LLM_BASE_URL: ${OPENAI_BASE_URL:-}
      HINDSIGHT_API_LLM_MODEL: claude-sonnet-4-5-20250929
    volumes:
      - hindsight-data:/home/hindsight/.pg0
      - hindsight-models:/home/hindsight/.cache
    depends_on:
      hindsight-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  hindsight-data:
  hindsight-models:
