name: Build and Publish

on:
  push:
    branches: [main]
    paths-ignore:
      - 'CLAUDE.md'
      - 'openspec/**'
      - '.claude/**'
      - '.serena/**'
  pull_request:
    paths-ignore:
      - 'CLAUDE.md'
      - 'openspec/**'
      - '.claude/**'
      - '.serena/**'

env:
  REGISTRY: ghcr.io

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TAG="${VERSION}-pr${{ github.event.pull_request.number }}"
          else
            TAG="${VERSION}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Check immutable version (main only)
        if: github.ref == 'refs/heads/main'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          for IMAGE in "ghcr.io/${{ github.repository }}-frontend" "ghcr.io/${{ github.repository }}-backend" "ghcr.io/${{ github.repository }}-task-runner"; do
            if docker manifest inspect "${IMAGE}:${TAG}" > /dev/null 2>&1; then
              echo "::error::Image tag ${TAG} already exists for ${IMAGE}. Bump the VERSION file."
              exit 1
            fi
          done

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run backend tests
        working-directory: backend
        env:
          DATABASE_URL: "sqlite+aiosqlite://"
          PYTHONPATH: "."
        run: |
          pip install -r requirements.txt -r requirements-test.txt -q
          pytest tests/ -v

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Run frontend tests
        working-directory: frontend
        run: |
          npm ci
          npm test

  build-frontend:
    needs: [version, test]
    runs-on: ubuntu-latest
    timeout-minutes: 7
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository }}-frontend:${{ needs.version.outputs.tag }}

  build-backend:
    needs: [version, test]
    runs-on: ubuntu-latest
    timeout-minutes: 7
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository }}-backend:${{ needs.version.outputs.tag }}

  build-task-runner:
    needs: [version, test]
    runs-on: ubuntu-latest
    timeout-minutes: 7
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push task runner image
        uses: docker/build-push-action@v6
        with:
          context: ./task-runner
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository }}-task-runner:${{ needs.version.outputs.tag }}

  helm:
    needs: [version, build-frontend, build-backend, build-task-runner]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package and push Helm chart
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          helm repo add valkey https://valkey.io/valkey-helm/
          helm dependency build helm/content-manager
          helm package helm/content-manager \
            --version "${TAG}" \
            --app-version "${TAG}"
          helm push "content-manager-${TAG}.tgz" "oci://${{ env.REGISTRY }}/${{ github.repository }}/charts"
