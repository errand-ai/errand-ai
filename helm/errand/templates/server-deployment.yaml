apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "errand.fullname" . }}-server
  labels:
    {{- include "errand.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  replicas: {{ .Values.server.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/component: server
    spec:
      containers:
        - name: server
          image: "{{ .Values.server.image.repository }}:{{ .Values.server.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.server.image.pullPolicy }}
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret }}
                  key: {{ .Values.database.secretKey }}
            - name: OIDC_DISCOVERY_URL
              value: {{ .Values.keycloak.discoveryUrl | quote }}
            - name: OIDC_ROLES_CLAIM
              value: {{ .Values.keycloak.rolesClaim | quote }}
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloak.existingSecret }}
                  key: {{ .Values.keycloak.secretKeyClientId }}
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloak.existingSecret }}
                  key: {{ .Values.keycloak.secretKeyClientSecret }}
            {{- if .Values.valkey.enabled }}
            - name: VALKEY_URL
              value: "redis://{{ .Release.Name }}-valkey:6379"
            {{- end }}
            {{- if .Values.openai.baseUrl }}
            - name: OPENAI_BASE_URL
              value: {{ .Values.openai.baseUrl | quote }}
            {{- end }}
            {{- if .Values.openai.existingSecret }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.openai.existingSecret }}
                  key: {{ .Values.openai.secretKeyApiKey }}
            {{- else if .Values.openai.apiKey }}
            - name: OPENAI_API_KEY
              value: {{ .Values.openai.apiKey | quote }}
            {{- end }}
            {{- if .Values.credentialEncryption.existingSecret }}
            - name: CREDENTIAL_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credentialEncryption.existingSecret }}
                  key: {{ .Values.credentialEncryption.secretKey }}
            {{- end }}
            {{- if .Values.worker.maxTurns }}
            - name: MAX_TURNS
              value: {{ .Values.worker.maxTurns | quote }}
            {{- end }}
            {{- if .Values.gdrive.enabled }}
            - name: GDRIVE_MCP_URL
              value: "http://{{ include "errand.fullname" . }}-gdrive-mcp:{{ .Values.gdrive.port }}/mcp"
            {{- end }}
            {{- if .Values.onedrive.enabled }}
            - name: ONEDRIVE_MCP_URL
              value: "http://{{ include "errand.fullname" . }}-onedrive-mcp:{{ .Values.onedrive.port }}/mcp"
            {{- end }}
            {{- if .Values.gdrive.existingSecret }}
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.gdrive.existingSecret }}
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.gdrive.existingSecret }}
                  key: GOOGLE_CLIENT_SECRET
            {{- end }}
            {{- if .Values.onedrive.existingSecret }}
            - name: MICROSOFT_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.onedrive.existingSecret }}
                  key: MICROSOFT_CLIENT_ID
            - name: MICROSOFT_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.onedrive.existingSecret }}
                  key: MICROSOFT_CLIENT_SECRET
            - name: MICROSOFT_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.onedrive.existingSecret }}
                  key: MICROSOFT_TENANT_ID
            {{- end }}
          {{- if .Values.twitter.existingSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.twitter.existingSecret }}
          {{- end }}
