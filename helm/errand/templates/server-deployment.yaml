apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "errand.fullname" . }}-server
  labels:
    {{- include "errand.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  replicas: {{ .Values.server.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/component: server
    spec:
      serviceAccountName: {{ include "errand.fullname" . }}-server
      containers:
        - name: server
          image: "{{ .Values.server.image.repository }}:{{ .Values.server.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.server.image.pullPolicy }}
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret }}
                  key: {{ .Values.database.secretKey }}
            - name: OIDC_DISCOVERY_URL
              value: {{ .Values.keycloak.discoveryUrl | quote }}
            - name: OIDC_ROLES_CLAIM
              value: {{ .Values.keycloak.rolesClaim | quote }}
            {{- if .Values.cloudKeycloak.url }}
            - name: CLOUD_KEYCLOAK_URL
              value: {{ .Values.cloudKeycloak.url | quote }}
            {{- end }}
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloak.existingSecret }}
                  key: {{ .Values.keycloak.secretKeyClientId }}
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloak.existingSecret }}
                  key: {{ .Values.keycloak.secretKeyClientSecret }}
            {{- if .Values.valkey.enabled }}
            - name: VALKEY_URL
              value: "redis://{{ .Release.Name }}-valkey:6379"
            {{- end }}
            {{- range $index, $provider := .Values.llmProviders }}
            - name: LLM_PROVIDER_{{ $index }}_NAME
              value: {{ $provider.name | quote }}
            - name: LLM_PROVIDER_{{ $index }}_BASE_URL
              value: {{ $provider.baseUrl | quote }}
            {{- if $provider.existingSecret }}
            - name: LLM_PROVIDER_{{ $index }}_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $provider.existingSecret }}
                  key: {{ $provider.secretKeyApiKey }}
            {{- else }}
            - name: LLM_PROVIDER_{{ $index }}_API_KEY
              value: {{ $provider.apiKey | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.credentialEncryption.existingSecret }}
            - name: CREDENTIAL_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credentialEncryption.existingSecret }}
                  key: {{ .Values.credentialEncryption.secretKey }}
            {{- end }}
            - name: CONTAINER_RUNTIME
              value: "kubernetes"
            - name: TASK_RUNNER_IMAGE
              value: "{{ .Values.taskRunner.image.repository }}:{{ .Values.taskRunner.image.tag | default .Chart.AppVersion }}"
            - name: ERRAND_MCP_URL
              value: "http://{{ include "errand.fullname" . }}:{{ .Values.server.service.port }}/mcp/"
            {{- if .Values.playwright.enabled }}
            - name: PLAYWRIGHT_MCP_URL
              value: "http://{{ include "errand.fullname" . }}-playwright:{{ .Values.playwright.port }}/mcp"
            {{- end }}
            {{- if .Values.hindsight.url }}
            - name: HINDSIGHT_URL
              value: {{ .Values.hindsight.url | quote }}
            {{- end }}
            {{- if .Values.hindsight.bankId }}
            - name: HINDSIGHT_BANK_ID
              value: {{ .Values.hindsight.bankId | quote }}
            {{- end }}
            {{- if .Values.server.maxTurns }}
            - name: MAX_TURNS
              value: {{ .Values.server.maxTurns | quote }}
            {{- end }}
            {{- if .Values.server.maxConcurrentTasks }}
            - name: MAX_CONCURRENT_TASKS
              value: {{ .Values.server.maxConcurrentTasks | quote }}
            {{- end }}
            {{- if .Values.onedrive.enabled }}
            - name: ONEDRIVE_MCP_URL
              value: "http://{{ include "errand.fullname" . }}-onedrive-mcp:{{ .Values.onedrive.port }}/mcp"
            {{- end }}
            {{- if .Values.gdrive.existingSecret }}
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.gdrive.existingSecret }}
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.gdrive.existingSecret }}
                  key: GOOGLE_CLIENT_SECRET
            {{- end }}
            {{- if .Values.onedrive.existingSecret }}
            - name: MICROSOFT_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.onedrive.existingSecret }}
                  key: MICROSOFT_CLIENT_ID
            - name: MICROSOFT_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.onedrive.existingSecret }}
                  key: MICROSOFT_CLIENT_SECRET
            - name: MICROSOFT_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.onedrive.existingSecret }}
                  key: MICROSOFT_TENANT_ID
            {{- end }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          {{- if .Values.twitter.existingSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.twitter.existingSecret }}
          {{- end }}
