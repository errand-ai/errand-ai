{{- if .Values.playwright.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "errand.fullname" . }}-playwright
  labels:
    {{- include "errand.labels" . | nindent 4 }}
    app.kubernetes.io/component: playwright
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/component: playwright
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/component: playwright
    spec:
      containers:
        - name: playwright
          image: "{{ .Values.playwright.image.repository }}:{{ .Values.playwright.image.tag }}"
          imagePullPolicy: {{ .Values.playwright.image.pullPolicy | default "IfNotPresent" }}
          args: ["--isolated", "--port", "{{ .Values.playwright.port }}", "--host", "0.0.0.0", "--allowed-hosts", "*"]
          ports:
            - containerPort: {{ .Values.playwright.port }}
          resources:
            limits:
              memory: {{ .Values.playwright.memoryLimit }}
{{- end }}
