{{- if .Values.playwright.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "errand.fullname" . }}-playwright
  labels:
    {{- include "errand.labels" . | nindent 4 }}
    app.kubernetes.io/component: playwright
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/component: playwright
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/component: playwright
    spec:
      containers:
        - name: playwright
          image: "{{ .Values.playwright.image.repository }}:{{ .Values.playwright.image.tag }}"
          imagePullPolicy: {{ .Values.playwright.image.pullPolicy | default "IfNotPresent" }}
          command: ["sh", "-c"]
          args:
            - >-
              Xvfb :99 -screen 0 1920x1080x24 -ac -nolisten tcp &
              sleep 1 &&
              DISPLAY=:99 exec node /app/cli.js --browser chromium --no-sandbox
              --isolated --port {{ .Values.playwright.port }} --host 0.0.0.0 --allowed-hosts '*'
          ports:
            - containerPort: {{ .Values.playwright.port }}
          resources:
            limits:
              memory: {{ .Values.playwright.memoryLimit }}
          volumeMounts:
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
{{- end }}
