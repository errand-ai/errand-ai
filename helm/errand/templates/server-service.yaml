apiVersion: v1
kind: Service
metadata:
  name: {{ include "errand.fullname" . }}
  labels:
    {{- include "errand.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  selector:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/component: server
  ports:
    - port: {{ .Values.server.service.port }}
      targetPort: 8000
