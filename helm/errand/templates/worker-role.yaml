apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "errand.fullname" . }}-worker
  labels:
    {{- include "errand.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "get", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create", "get"]
