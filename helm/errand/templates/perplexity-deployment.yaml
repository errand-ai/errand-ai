{{- if .Values.perplexity.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "errand.fullname" . }}-perplexity-mcp
  labels:
    {{- include "errand.labels" . | nindent 4 }}
    app.kubernetes.io/component: perplexity-mcp
spec:
  replicas: {{ .Values.perplexity.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/component: perplexity-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/component: perplexity-mcp
    spec:
      containers:
        - name: perplexity-mcp
          image: "{{ .Values.perplexity.image.repository }}:{{ .Values.perplexity.image.tag }}"
          imagePullPolicy: {{ .Values.perplexity.image.pullPolicy }}
          ports:
            - containerPort: 8080
          env:
            - name: BACKEND_URL
              value: "http://{{ include "errand.fullname" . }}:{{ .Values.server.service.port }}"
          readinessProbe:
            httpGet:
              path: /mcp
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /mcp
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
{{- end }}
