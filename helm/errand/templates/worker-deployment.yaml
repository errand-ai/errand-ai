apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "errand.fullname" . }}-worker
  labels:
    {{- include "errand.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: {{ include "errand.fullname" . }}-worker
      containers:
        - name: worker
          image: "{{ .Values.server.image.repository }}:{{ .Values.server.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.server.image.pullPolicy }}
          command: ["python", "worker.py"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret }}
                  key: {{ .Values.database.secretKey }}
            {{- if .Values.valkey.enabled }}
            - name: VALKEY_URL
              value: "redis://{{ .Release.Name }}-valkey:6379"
            {{- end }}
            - name: CONTAINER_RUNTIME
              value: "kubernetes"
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: TASK_RUNNER_IMAGE
              value: "{{ .Values.taskRunner.image.repository }}:{{ .Values.taskRunner.image.tag | default .Chart.AppVersion }}"
            {{- if .Values.openai.baseUrl }}
            - name: OPENAI_BASE_URL
              value: {{ .Values.openai.baseUrl | quote }}
            {{- end }}
            {{- if .Values.openai.existingSecret }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.openai.existingSecret }}
                  key: {{ .Values.openai.secretKeyApiKey }}
            {{- else if .Values.openai.apiKey }}
            - name: OPENAI_API_KEY
              value: {{ .Values.openai.apiKey | quote }}
            {{- end }}
            {{- if .Values.credentialEncryption.existingSecret }}
            - name: CREDENTIAL_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credentialEncryption.existingSecret }}
                  key: {{ .Values.credentialEncryption.secretKey }}
            {{- end }}
            - name: ERRAND_MCP_URL
              value: "http://{{ include "errand.fullname" . }}:{{ .Values.server.service.port }}/mcp/"
            {{- if .Values.worker.maxTurns }}
            - name: MAX_TURNS
              value: {{ .Values.worker.maxTurns | quote }}
            {{- end }}
            {{- if .Values.hindsight.url }}
            - name: HINDSIGHT_URL
              value: {{ .Values.hindsight.url | quote }}
            {{- end }}
            {{- if .Values.hindsight.bankId }}
            - name: HINDSIGHT_BANK_ID
              value: {{ .Values.hindsight.bankId | quote }}
            {{- end }}
            {{- if .Values.gdrive.enabled }}
            - name: GDRIVE_MCP_URL
              value: "http://{{ include "errand.fullname" . }}-gdrive-mcp:{{ .Values.gdrive.port }}/mcp"
            {{- end }}
            {{- if .Values.onedrive.enabled }}
            - name: ONEDRIVE_MCP_URL
              value: "http://{{ include "errand.fullname" . }}-onedrive-mcp:{{ .Values.onedrive.port }}/mcp"
            {{- end }}
            {{- if .Values.gdrive.existingSecret }}
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.gdrive.existingSecret }}
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.gdrive.existingSecret }}
                  key: GOOGLE_CLIENT_SECRET
            {{- end }}
            {{- if .Values.onedrive.existingSecret }}
            - name: MICROSOFT_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.onedrive.existingSecret }}
                  key: MICROSOFT_CLIENT_ID
            - name: MICROSOFT_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.onedrive.existingSecret }}
                  key: MICROSOFT_CLIENT_SECRET
            - name: MICROSOFT_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.onedrive.existingSecret }}
                  key: MICROSOFT_TENANT_ID
            {{- end }}
            - name: PLAYWRIGHT_MCP_IMAGE
              value: "{{ .Values.playwright.image.repository }}:{{ .Values.playwright.image.tag }}"
            - name: PLAYWRIGHT_PORT
              value: {{ .Values.playwright.port | quote }}
            - name: PLAYWRIGHT_STARTUP_TIMEOUT
              value: {{ .Values.playwright.startupTimeout | quote }}
        - name: playwright
          image: "{{ .Values.playwright.image.repository }}:{{ .Values.playwright.image.tag }}"
          imagePullPolicy: {{ .Values.playwright.image.pullPolicy | default "IfNotPresent" }}
          args: ["--port", "{{ .Values.playwright.port }}", "--host", "0.0.0.0", "--allowed-hosts", "*"]
          ports:
            - containerPort: {{ .Values.playwright.port }}
          resources:
            limits:
              memory: {{ .Values.playwright.memoryLimit }}
