server:
  replicaCount: 1
  image:
    repository: ghcr.io/errand-ai/errand
    tag: ""
    pullPolicy: IfNotPresent
  service:
    port: 8000
  maxConcurrentTasks: 3
  maxTurns: "200"

taskRunner:
  image:
    repository: ghcr.io/errand-ai/errand-task-runner
    tag: ""
    pullPolicy: IfNotPresent

playwright:
  enabled: true
  image:
    repository: mcr.microsoft.com/playwright/mcp
    tag: "latest"
    pullPolicy: IfNotPresent
  memoryLimit: "512Mi"
  port: 8931
  startupTimeout: 30

database:
  existingSecret: content-manager-db
  secretKey: DATABASE_URL

keycloak:
  existingSecret: content-manager-keycloak
  secretKeyClientId: OIDC_CLIENT_ID
  secretKeyClientSecret: OIDC_CLIENT_SECRET
  discoveryUrl: https://id.devops-consultants.net/auth/realms/devops-consultants/.well-known/openid-configuration
  rolesClaim: resource_access.errand.roles

llmProviders: []
  # - name: litellm
  #   baseUrl: "https://litellm.example.com/v1"
  #   apiKey: ""
  #   existingSecret: ""
  #   secretKeyApiKey: ""

valkey:
  enabled: true
  standalone:
    persistence:
      enabled: false
  resources:
    limits:
      cpu: 250m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

credentialEncryption:
  existingSecret: ""
  secretKey: CREDENTIAL_ENCRYPTION_KEY

# Deprecated: Twitter credentials are now managed via the platform UI.
# Kept for backwards compatibility with existing deployments.
twitter:
  existingSecret: ""

gdrive:
  enabled: true
  image:
    repository: ghcr.io/devops-consultants/google-drive-mcp-server
    tag: ""
    pullPolicy: IfNotPresent
  port: 8080
  existingSecret: ""

onedrive:
  enabled: true
  image:
    repository: ghcr.io/devops-consultants/one-drive-mcp-server
    tag: ""
    pullPolicy: IfNotPresent
  port: 8080
  existingSecret: ""

hindsight:
  url: ""
  bankId: "errand-tasks"

ingress:
  enabled: true
  host: tasks.example.com
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
  tls:
    enabled: false
    secretName: ""
