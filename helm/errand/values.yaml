server:
  replicaCount: 1
  image:
    repository: ghcr.io/errand-ai/errand
    tag: ""
    pullPolicy: IfNotPresent
  service:
    port: 8000

worker:
  replicaCount: 0
  maxTurns: "200"

taskRunner:
  image:
    repository: ghcr.io/errand-ai/errand-task-runner
    tag: ""
    pullPolicy: IfNotPresent

playwright:
  image:
    repository: mcr.microsoft.com/playwright/mcp
    tag: "latest"
    pullPolicy: IfNotPresent
  memoryLimit: "512Mi"
  port: 8931
  startupTimeout: 30

database:
  existingSecret: content-manager-db
  secretKey: DATABASE_URL

keda:
  enabled: true
  pollingInterval: 10
  cooldownPeriod: 60
  minReplicaCount: 0
  maxReplicaCount: 5
  threshold: "1"

keycloak:
  existingSecret: content-manager-keycloak
  secretKeyClientId: OIDC_CLIENT_ID
  secretKeyClientSecret: OIDC_CLIENT_SECRET
  discoveryUrl: https://id.devops-consultants.net/auth/realms/devops-consultants/.well-known/openid-configuration
  rolesClaim: resource_access.errand.roles

openai:
  baseUrl: ""
  apiKey: ""
  existingSecret: ""
  secretKeyApiKey: OPENAI_API_KEY

valkey:
  enabled: true
  standalone:
    persistence:
      enabled: false
  resources:
    limits:
      cpu: 250m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

credentialEncryption:
  existingSecret: ""
  secretKey: CREDENTIAL_ENCRYPTION_KEY

# Deprecated: Twitter credentials are now managed via the platform UI.
# Kept for backwards compatibility with existing deployments.
twitter:
  existingSecret: ""

hindsight:
  url: ""
  bankId: "errand-tasks"

perplexity:
  existingSecret: ""
  replicaCount: 1
  image:
    repository: quay.io/devops_consultants/perplexity-mcp-server
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8080

ingress:
  enabled: true
  host: tasks.example.com
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
  tls:
    enabled: false
    secretName: ""
