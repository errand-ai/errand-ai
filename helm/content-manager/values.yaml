frontend:
  replicaCount: 1
  image:
    repository: ghcr.io/devops-consultants/content-manager-frontend
    tag: ""
    pullPolicy: IfNotPresent
  service:
    port: 80

backend:
  replicaCount: 1
  image:
    repository: ghcr.io/devops-consultants/content-manager-backend
    tag: ""
    pullPolicy: IfNotPresent
  service:
    port: 8000

worker:
  replicaCount: 0

database:
  existingSecret: content-manager-db
  secretKey: DATABASE_URL

keda:
  enabled: true
  pollingInterval: 10
  cooldownPeriod: 60
  minReplicaCount: 0
  maxReplicaCount: 5
  threshold: "1"

keycloak:
  existingSecret: content-manager-keycloak
  secretKeyClientId: OIDC_CLIENT_ID
  secretKeyClientSecret: OIDC_CLIENT_SECRET
  discoveryUrl: https://id.devops-consultants.net/auth/realms/devops-consultants/.well-known/openid-configuration
  rolesClaim: resource_access.content-manager.roles

valkey:
  enabled: true
  standalone:
    persistence:
      enabled: false
  resources:
    limits:
      cpu: 250m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

ingress:
  enabled: true
  host: tasks.example.com
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
  tls:
    enabled: false
    secretName: ""
