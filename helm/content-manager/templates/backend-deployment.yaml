apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "content-manager.fullname" . }}-backend
  labels:
    {{- include "content-manager.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret }}
                  key: {{ .Values.database.secretKey }}
            - name: OIDC_DISCOVERY_URL
              value: {{ .Values.keycloak.discoveryUrl | quote }}
            - name: OIDC_ROLES_CLAIM
              value: {{ .Values.keycloak.rolesClaim | quote }}
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloak.existingSecret }}
                  key: {{ .Values.keycloak.secretKeyClientId }}
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloak.existingSecret }}
                  key: {{ .Values.keycloak.secretKeyClientSecret }}
            {{- if .Values.valkey.enabled }}
            - name: VALKEY_URL
              value: "redis://{{ .Release.Name }}-valkey:6379"
            {{- end }}
