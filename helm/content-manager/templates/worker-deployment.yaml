apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "content-manager.fullname" . }}-worker
  labels:
    {{- include "content-manager.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: worker
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          command: ["python", "worker.py"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret }}
                  key: {{ .Values.database.secretKey }}
            {{- if .Values.valkey.enabled }}
            - name: VALKEY_URL
              value: "redis://{{ .Release.Name }}-valkey:6379"
            {{- end }}
            - name: DOCKER_HOST
              value: "tcp://localhost:2375"
            - name: TASK_RUNNER_IMAGE
              value: "{{ .Values.taskRunner.image.repository }}:{{ .Values.taskRunner.image.tag | default .Chart.AppVersion }}"
            {{- if .Values.openai.baseUrl }}
            - name: OPENAI_BASE_URL
              value: {{ .Values.openai.baseUrl | quote }}
            {{- end }}
            {{- if .Values.openai.existingSecret }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.openai.existingSecret }}
                  key: {{ .Values.openai.secretKeyApiKey }}
            {{- else if .Values.openai.apiKey }}
            - name: OPENAI_API_KEY
              value: {{ .Values.openai.apiKey | quote }}
            {{- end }}
            {{- if .Values.credentialEncryption.existingSecret }}
            - name: CREDENTIAL_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credentialEncryption.existingSecret }}
                  key: {{ .Values.credentialEncryption.secretKey }}
            {{- end }}
            - name: BACKEND_MCP_URL
              value: "http://{{ include "content-manager.fullname" . }}-backend:{{ .Values.backend.service.port }}/mcp"
            {{- if .Values.worker.maxTurns }}
            - name: MAX_TURNS
              value: {{ .Values.worker.maxTurns | quote }}
            {{- end }}
            {{- if .Values.perplexity.existingSecret }}
            - name: USE_PERPLEXITY
              value: "true"
            - name: PERPLEXITY_URL
              value: "http://{{ include "content-manager.fullname" . }}-perplexity-mcp:{{ .Values.perplexity.service.port }}/mcp"
            {{- end }}
            {{- if .Values.hindsight.url }}
            - name: HINDSIGHT_URL
              value: {{ .Values.hindsight.url | quote }}
            {{- end }}
            {{- if .Values.hindsight.bankId }}
            - name: HINDSIGHT_BANK_ID
              value: {{ .Values.hindsight.bankId | quote }}
            {{- end }}
            - name: PLAYWRIGHT_MCP_IMAGE
              value: "{{ .Values.playwrightMcp.image.repository }}:{{ .Values.playwrightMcp.image.tag }}"
            - name: PLAYWRIGHT_MEMORY_LIMIT
              value: {{ .Values.playwrightMcp.memoryLimit | quote }}
            - name: PLAYWRIGHT_PORT
              value: {{ .Values.playwrightMcp.port | quote }}
            - name: PLAYWRIGHT_STARTUP_TIMEOUT
              value: {{ .Values.playwrightMcp.startupTimeout | quote }}
        - name: dind
          image: {{ .Values.dind.image }}
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
