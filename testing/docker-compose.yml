services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: content_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - errand-net

  valkey:
    image: valkey/valkey:9-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - errand-net

  migrate:
    build:
      context: ..
      dockerfile: Dockerfile
      secrets:
        - npm_token
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/content_manager
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - errand-net

  task-runner-build:
    build:
      context: ../task-runner
      dockerfile: Dockerfile
    image: errand-task-runner:latest
    entrypoint: ["true"]

  errand:
    build:
      context: ..
      dockerfile: Dockerfile
      secrets:
        - npm_token
      args:
        APP_VERSION: ${APP_VERSION:-dev}
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/content_manager
      # OIDC_DISCOVERY_URL: ${OIDC_DISCOVERY_URL}
      # OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
      # OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      # OIDC_ROLES_CLAIM: resource_access.content-manager.roles
      # Trusted issuer for cloud-relayed JWTs (X-Cloud-JWT header). Must
      # match the cloud Keycloak realm URL exactly; set via .env to enable
      # cloud JWT auth locally. Leave unset for local-only dev.
      # CLOUD_KEYCLOAK_URL: ${CLOUD_KEYCLOAK_URL:-}
      VALKEY_URL: redis://valkey:6379
      CONTAINER_RUNTIME: docker
      TASK_RUNNER_IMAGE: errand-task-runner:latest
      TASK_RUNNER_NETWORK: errand-net
      ERRAND_MCP_URL: http://errand:8000/mcp/
      HINDSIGHT_URL: http://hindsight:8888
      PLAYWRIGHT_MCP_URL: http://playwright:3000/mcp
      LLM_PROVIDER_0_NAME: ${LLM_PROVIDER_0_NAME:-}
      LLM_PROVIDER_0_BASE_URL: ${LLM_PROVIDER_0_BASE_URL:-}
      LLM_PROVIDER_0_API_KEY: ${LLM_PROVIDER_0_API_KEY:-}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY}
      TWITTER_API_KEY: ${TWITTER_API_KEY:-}
      TWITTER_API_SECRET: ${TWITTER_API_SECRET:-}
      TWITTER_ACCESS_TOKEN: ${TWITTER_ACCESS_TOKEN:-}
      TWITTER_ACCESS_SECRET: ${TWITTER_ACCESS_SECRET:-}
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: changeme
      MAX_TURNS: "200"
      ONEDRIVE_MCP_URL: http://onedrive-mcp:8080/mcp
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
      MICROSOFT_TENANT_ID: ${MICROSOFT_TENANT_ID:-common}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      migrate:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
      task-runner-build:
        condition: service_completed_successfully
    networks:
      - errand-net

  onedrive-mcp:
    image: ghcr.io/devops-consultants/one-drive-mcp-server:latest
    ports:
      - "8082:8080"
    networks:
      - errand-net

  playwright:
    image: mcr.microsoft.com/playwright/mcp:latest
    entrypoint: ["sh", "-c"]
    command:
      - >-
        Xvfb :99 -screen 0 1920x1080x24 -ac -nolisten tcp &
        sleep 1 &&
        DISPLAY=:99 exec node /app/cli.js --browser chromium --no-sandbox
        --isolated --port 3000 --host 0.0.0.0 --allowed-hosts '*'
    shm_size: '2gb'
    ports:
      - "3000:3000"
    networks:
      - errand-net

  hindsight-init:
    image: ghcr.io/vectorize-io/hindsight:latest
    user: root
    volumes:
      - hindsight-data:/home/hindsight/.pg0
      - hindsight-models:/home/hindsight/.cache
    command: chown -R hindsight:hindsight /home/hindsight/.pg0 /home/hindsight/.cache
    networks:
      - errand-net

  hindsight:
    image: ghcr.io/vectorize-io/hindsight:latest
    ports:
      - "8888:8888"
      - "9999:9999"
    environment:
      HINDSIGHT_API_LLM_API_KEY: ${OPENAI_API_KEY}
      HINDSIGHT_API_LLM_BASE_URL: ${OPENAI_BASE_URL:-}
      HINDSIGHT_API_LLM_MODEL: claude-sonnet-4-5-20250929
    volumes:
      - hindsight-data:/home/hindsight/.pg0
      - hindsight-models:/home/hindsight/.cache
    depends_on:
      hindsight-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - errand-net

secrets:
  npm_token:
    environment: NPM_TOKEN

volumes:
  postgres-data:
  hindsight-data:
  hindsight-models:

networks:
  errand-net:
    name: errand-net
