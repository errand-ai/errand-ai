general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_connection_pool_limits: 10 # limit the number of database connections to = MAX Number of DB Connections/Number of instances of litellm proxy (Around 10-20 is good number)
  store_model_in_db: true
  store_prompts_in_spend_logs: true
  disable_error_logs: false # turn off writing LLM Exceptions to DB

litellm_settings:
  request_timeout: 600 # raise Timeout error if call takes longer than 600 seconds. Default value is 6000seconds if not set
  set_verbose: False # Switch off Debug Logging, ensure your logs do not have any debugging on
